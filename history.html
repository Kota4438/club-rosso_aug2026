<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吉沢孝太郎 60年の歩み - 祝還暦イベント</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="style.css">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <style>
        .history-content {
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }
        .uc-title {
            font-size: 1.5rem;
            color: #8b0000;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .uc-text {
            font-size: 1.1rem;
            color: #444;
            margin-bottom: 40px;
        }
        .hero-link {
            display: inline-block;
            font-size: 1.2rem;
            color: #d4af37;
            font-weight: bold;
            text-decoration: underline;
            margin-bottom: 5px;
            cursor: pointer;
        }
        /* スライドショーのレイアウト */
        .slider-container {
            position: relative;
            max-width: 500px;
            margin: 40px auto;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .slider-wrapper {
            position: relative;
            width: 100%;
            height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #f7f7f7;
            border-radius: 4px;
        }
        .slider-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
        }
        .slider-wrapper img.active {
            display: block;
        }
        /* 左右のめくりボタン */
        .slide-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            border: none;
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }
        .slide-btn:hover {
            background: rgba(0, 0, 0, 0.8);
        }
        .btn-prev { left: 25px; }
        .btn-next { right: 25px; }
        
        .slide-counter {
            margin-top: 15px;
            font-size: 0.95rem;
            color: #666;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <nav class="nav-container">
            <div class="logo">
                <a href="index.html">
                    <img src="logo.jpg" alt="Celebrating 60th Birthday" class="logo-img">
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Top</a></li>
                <li><a href="access.html">Access</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="ticket.html" class="btn-ticket">Ticket</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-content" style="padding-top: 130px;">
        <div class="history-content">
            <p class="uc-title">吉沢孝太郎 60年の歩み：Under construction（工事中）</p>
            <p class="uc-text">近日中に更新いたしますので、楽しみにお待ちください。</p>
            
            <!-- 「昭和のヒーローｓ」リンク（クリックするとスライドへスクロール） -->
            <a href="#photo-slider" class="hero-link">👉 昭和のヒーローｓ</a>
            
            <!-- スライドショーエリア -->
            <div class="slider-container" id="photo-slider">
                <div class="slider-wrapper">
                    <!-- 最初の1枚目を初期表示 -->
                    <img src="hero (1).JPEG" alt="昭和のヒーロー" class="active" id="current-slide-img">
                </div>
                
                <!-- めくりボタン -->
                <button class="slide-btn btn-prev" onclick="changeSlide(-1)">&lt;</button>
                <button class="slide-btn btn-next" onclick="changeSlide(1)">&gt;</button>
                
                <!-- ページカウンター (合計21枚) -->
                <div class="slide-counter" id="slide-counter">1 / 21</div>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 Event Organizer. All Rights Reserved.</p>
    </footer>

    <!-- スライド切り替えプログラム（合計21枚対応） -->
    <script>
        let currentIndex = 1;
        const totalSlides = 21; // heroが16枚 + 追加分が5枚の合計21枚
        const imgElement = document.getElementById('current-slide-img');
        const counterElement = document.getElementById('slide-counter');

        function changeSlide(direction) {
            currentIndex += direction;
            
            // ループ設定
            if (currentIndex < 1) {
                currentIndex = totalSlides;
            } else if (currentIndex > totalSlides) {
                currentIndex = 1;
            }
            
            // 画像のファイル名を判定して出し分ける
            if (currentIndex <= 16) {
                // 1〜16枚目は hero (1).JPEG 〜 hero (16).JPEG
                imgElement.src = `hero (${currentIndex}).JPEG`;
            } else {
                // 17〜21枚目は (1).jpg 〜 (5).jpg 
                // 例: 17番目のときは (1).jpg、21番目のときは (5).jpg になるよう計算
                let subIndex = currentIndex - 16;
                imgElement.src = `(${subIndex}).jpg`;
            }
            
            // カウンター表示の更新
            counterElement.textContent = `${currentIndex} / ${totalSlides}`;
        }
    </script>

</body>
</html>
