<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>60年の歩み - 吉沢孝太郎"祝還暦"イベント</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="style.css">
    <style>
        .history-construction-container {
            max-width: 800px;
            margin: 60px auto;
            padding: 40px 20px;
            text-align: center;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .construction-status {
            display: inline-block;
            background: #8b0000;
            color: #fff;
            padding: 6px 16px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 50px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        .history-main-title {
            font-size: 2rem;
            color: #1a1a1a;
            margin-bottom: 15px;
            font-weight: 700;
        }
        /* 💡 1. 文言をシンプルに修正 */
        .history-lead {
            font-size: 1.1rem;
            color: #555;
            line-height: 1.8;
            margin-bottom: 30px;
            font-weight: bold;
        }
        
        /* 昭和のヒーローｓ タイトル */
        .hero-section-title {
            font-size: 1.4rem;
            color: #d4af37;
            font-weight: bold;
            margin: 40px 0 15px 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* スライドショーのレイアウト */
        .slider-container {
            position: relative;
            max-width: 500px;
            margin: 0 auto 20px auto;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .slider-wrapper {
            position: relative;
            width: 100%;
            height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #f7f7f7;
            border-radius: 4px;
        }
        .slider-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        /* 左右のめくりボタン */
        .slide-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            border: none;
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }
        .slide-btn:hover {
            background: rgba(0, 0, 0, 0.8);
        }
        .btn-prev { left: 25px; }
        .btn-next { right: 25px; }
        
        .slide-counter {
            margin-top: 15px;
            font-size: 0.95rem;
            color: #666;
            font-weight: bold;
        }

        .back-to-profile {
            display: inline-block;
            margin-top: 30px;
            color: #8b0000;
            font-weight: bold;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- ナビゲーションメニュー -->
    <header>
        <nav class="nav-container">
            <div class="logo">
                <a href="index.html">
                    <img src="logo.jpg" alt="Celebrating 60th Birthday" class="logo-img">
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Top</a></li>
                <li><a href="access.html">Access</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="ticket.html" class="btn-ticket">Ticket</a></li>
            </ul>
        </nav>
    </header>

    <!-- メインコンテンツエリア -->
    <main class="main-content" style="padding-top: 130px;">
        <div class="history-construction-container">
            <span class="construction-status">COMING SOON</span>
            <h2 class="history-main-title">吉沢孝太郎 60年の歩み</h2>
            <!-- 💡 1. 修正文言 -->
            <p class="history-lead">公開まで今しばらくお待ちください。</p>

            <hr style="border: 0; border-top: 1px dashed #eee; margin: 40px 0;">

            <!-- 📸 「昭和のヒーローｓ」セクション -->
            <h3 class="hero-section-title">👉 昭和のヒーローｓ</h3>
            
            <div class="slider-container">
                <div class="slider-wrapper">
                    <!-- 💡 2. 初期表示に1番目の写真をセット -->
                    <img src="hero (1).JPEG" alt="昭和のヒーロー" id="current-slide-img">
                </div>
                
                <!-- 手動めくりボタン -->
                <button class="slide-btn btn-prev" onclick="changeSlide(-1)">&lt;</button>
                <button class="slide-btn btn-next" onclick="changeSlide(1)">&gt;</button>
                
                <!-- カウンター（全12枚） -->
                <div class="slide-counter" id="slide-counter">1 / 12</div>
            </div>

            <p>
                <a href="profile.html" class="back-to-profile">← プロフィールページに戻る</a>
            </p>
        </div>
    </main>

    <footer>
        <p>© 2026 Event Organizer. All Rights Reserved.</p>
    </footer>

    <!-- スライド手動切り替えプログラム（ご指定の12枚の順番を完全再現） -->
    <script>
        // 💡 2. ご指定いただいた順番通りに画像ファイル名を配列化（計12枚）
        const photoList = [
            "hero (1).JPEG",
            "hero (11).JPEG",
            "hero (10).JPEG",
            "hero (2).JPEG",
            "hero (12).JPEG",
            "hero (13).JPEG",
            "hero (14).JPEG",
            "hero (15).JPEG",
            "hero (16).JPEG",
            "(1).jpg",
            "(2).jpg",
            "(3).jpg"
        ];

        let currentIndex = 0; // 0番目＝hero (1).JPEG
        const imgElement = document.getElementById('current-slide-img');
        const counterElement = document.getElementById('slide-counter');

        function changeSlide(direction) {
            currentIndex += direction;
            
            // ループ処理（最初と最後を繋ぐ）
            if (currentIndex < 0) {
                currentIndex = photoList.length - 1;
            } else if (currentIndex >= photoList.length) {
                currentIndex = 0;
            }
            
            // 画像の差し替え
            imgElement.src = photoList[currentIndex];
            
            // カウンターの表示更新（インデックスに+1する）
            counterElement.textContent = `${currentIndex + 1} / ${photoList.length}`;
        }
    </script>

</body>
</html>
